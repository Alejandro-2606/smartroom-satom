<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Iniciar sesión · SmartRoom</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="{{ url_for('static', filename='icons/icon-192.png') }}" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.png') }}" />
  <meta name="theme-color" content="#111111" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
</head>
<body data-page="login">

  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">Smart<span>Room</span></div>
      <div class="login-sub">Sistema Automatizado de Toma de Ocupación y Monitoreo</div>

      <div class="login-error" id="loginError"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Correo institucional</label>
          <input
            type="email"
            id="loginEmail"
            class="form-input"
            placeholder="nombre@mail.udp.cl"
            required
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Contraseña</label>
          <input
            type="password"
            id="loginPassword"
            class="form-input"
            placeholder="••••••••"
            required
          />
        </div>

        <button type="submit" class="login-btn" id="loginBtn">Ingresar</button>
      </form>
    </div>
  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
